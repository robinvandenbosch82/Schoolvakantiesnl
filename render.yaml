# Render Blueprint — deploy schoolvakanties.nl (Django, SSR).
# Managed Postgres + wekelijkse OpenHolidays-import (cron).
# Docs: https://render.com/docs/blueprint-spec
#
# SECRET_KEY wordt eenmalig gegenereerd en gedeeld via de env-group. Het admin-
# wachtwoord staat op `sync: false`: Render maakt de key, jij vult de waarde in
# het dashboard — zo staat hij niet in git.

databases:
  - name: schoolvakanties-db
    databaseName: schoolvakanties
    user: schoolvakanties
    region: frankfurt
    plan: basic-256mb        # NB: gratis Postgres verloopt na 90 dagen

envVarGroups:
  - name: schoolvakanties-env
    envVars:
      - key: SECRET_KEY
        generateValue: true            # Render genereert een sterke key (web + cron)
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: schoolvakanties.nl,www.schoolvakanties.nl,schoolvakanties.onrender.com
      - key: SITE_ORIGIN
        value: https://www.schoolvakanties.nl
      - key: USE_MANIFEST_STATIC
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.13"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: robinvandenbosch82@gmail.com
      # ── Secret: laat leeg hier, vul de waarde in het Render-dashboard ──
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Optioneel: eigen Pexels-sleutel voor de admin-fotowidget.
      - key: PEXELS_API_KEY
        sync: false

services:
  # ── Web (gunicorn) ──────────────────────────────────────────────────────
  - type: web
    name: schoolvakanties
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    # migrate + verse host vullen (import + seed + pages + superuser). Idempotent.
    preDeployCommand: "python manage.py migrate --noinput && python manage.py bootstrap_site"
    startCommand: "gunicorn config.wsgi:application --workers 3 --timeout 60"
    healthCheckPath: /robots.txt
    envVars:
      - fromGroup: schoolvakanties-env
      - key: DATABASE_URL
        fromDatabase:
          name: schoolvakanties-db
          property: connectionString

  # ── Wekelijkse data-import (cron) ───────────────────────────────────────
  # Houdt álle vakantie-/feestdagdata vers: OpenHolidays + nationale bronnen
  # (NL/FR) + feestdagen-only landen (Nager) + gaten aanvullen. Idempotent;
  # respecteert in de admin vergrendelde rijen. Maandag 04:00 UTC.
  - type: cron
    name: data-import
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 4 * * 1"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py import_alles --fill"
    envVars:
      - fromGroup: schoolvakanties-env
      - key: DATABASE_URL
        fromDatabase:
          name: schoolvakanties-db
          property: connectionString

  # ── Dagelijkse backlink-controle (cron) ─────────────────────────────────
  # Verifieert of de bron-link nog op elke widget-pagina staat en zet de modus
  # (volledige data ↔ teaser). Met hysterese + waarschuwingsmail. 06:00 UTC.
  - type: cron
    name: backlink-check
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 6 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py check_backlinks"
    envVars:
      - fromGroup: schoolvakanties-env
      - key: DATABASE_URL
        fromDatabase:
          name: schoolvakanties-db
          property: connectionString
